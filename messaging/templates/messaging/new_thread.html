<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Thread</title>
</head>
<body>
    <h2>New Message</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Start conversation</button>
    </form>

    <p><a href="{% url 'messaging:inbox' %}">Back to inbox</a></p>
</body>
</html>
