<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Offer</title>
</head>
<body>
    {% extends "base.html" %}

    {% block content %}
    <div class="container mt-4">
        <h2>Create an Offer</h2>
        <p>Volunteers can offer items for unhoused users to claim.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Submit Offer</button>
        </form>
    </div>
    {% endblock %}
</body>
</html>
